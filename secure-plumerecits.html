<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<title>Plume & Récits — Bibliothèque privée</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#1e293b;
  --accent:#7c3aed;
}

/* GLOBAL */
body{
  margin:0;
  font-family:Inter, system-ui;
  background:linear-gradient(180deg,#f9fafb 0%,#eef2ff 100%);
  color:#1e293b;
}

/* HEADER */
.header{
  background: linear-gradient(135deg,#1e293b,#312e81,#7c3aed);
  color:white;
  padding:20px 0;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.header-content{
  max-width:1100px;
  margin:auto;
  padding:0 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.brand{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:46px;
  height:46px;
  border-radius:12px;
  background:rgba(255,255,255,.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.title{
  font-family:"Playfair Display", serif;
}

.subtitle{
  font-size:12px;
  opacity:.8;
}

.btn{
  padding:10px 18px;
  border-radius:10px;
  border:none;
  font-weight:600;
  cursor:pointer;
}

.btn.primary{
  background:white;
  color:#312e81;
}

/* TITRE */
h1{
  text-align:center;
  margin:40px 0 10px;
  font-family:"Playfair Display", serif;
}

/* GRID */
.gallery{
  max-width:1000px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

/* CARD TEXTE */
.card{
  background:white;
  padding:20px;
  border-radius:16px;
  cursor:pointer;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card h3{
  margin:0;
  font-size:18px;
}

/* LECTEUR */
#reader{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.reader-box{
  background:white;
  width:90%;
  max-width:700px;
  max-height:80%;
  padding:30px;
  border-radius:20px;
  display:flex;
  flex-direction:column;
}

#readerTitle{
  margin:0;
  font-family:"Playfair Display", serif;
}

#readerContent{
  margin-top:20px;
  overflow-y:auto;
  max-height:400px;
  line-height:1.7;
  white-space:pre-line;
}

footer{
  text-align:center;
  padding:30px;
  font-size:13px;
  opacity:.6;
}
</style>
</head>

<body>

<header class="header">
  <div class="header-content">
    <div class="brand">
      <div class="logo">PR</div>
      <div>
        <div class="title">Plume & Récits</div>
        <div class="subtitle">Bibliothèque privée</div>
      </div>
    </div>

    <button id="logoutBtn" class="btn primary">Quitter</button>
  </div>
</header>

<h1>Vos écrits</h1>

<section class="gallery" id="gallery"></section>

<footer>
  &copy; 2026 Plume & Récits — Accès sécurisé
</footer>

<!-- LECTEUR -->
<div id="reader">
  <div class="reader-box">
    <h2 id="readerTitle"></h2>
    <div id="readerContent"></div>
  </div>
</div>

<script>
// 🔐 Sécurité
if(!sessionStorage.getItem("demo_auth_token")){
  alert("Accès non autorisé !");
  window.location.href = "index.html";
}

// 🚪 Logout
document.getElementById("logoutBtn").onclick = ()=>{
  sessionStorage.removeItem("demo_auth_token");
  window.location.href = "index.html";
};

// 📚 Charger les textes
fetch("https://plume-recits.netlify.app/texts.json")
.then(res=>res.json())
.then(data=>{
  const gallery = document.getElementById("gallery");

  data.forEach(item=>{
    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("h3");
    title.textContent = item.title;

    card.appendChild(title);
    gallery.appendChild(card);

    card.onclick = async ()=>{
      try{
        const res = await fetch(item.file);
        const text = await res.text();

        document.getElementById("readerTitle").textContent = item.title;
        document.getElementById("readerContent").textContent = text;

        document.getElementById("reader").style.display = "flex";
      }catch(e){
        alert("Impossible de charger le texte.");
      }
    };
  });
})
.catch(()=>{
  document.getElementById("gallery").innerHTML =
    "<p style='text-align:center'>Erreur de chargement des textes.</p>";
});

// ❌ Fermer lecteur
document.getElementById("reader").onclick = (e)=>{
  if(e.target.id === "reader"){
    e.currentTarget.style.display = "none";
  }
};
</script>

</body>
</html>
